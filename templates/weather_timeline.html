<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flugwetter - Uetliberg</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --color-primary: #6366F1;
            --color-success: #10B981;
            --color-warning: #F59E0B;
            --color-danger: #EF4444;
            --color-bg: #0F172A;
            --color-text: #F8FAFC;
            --color-text-light: #94A3B8;
            --color-border: rgba(255, 255, 255, 0.1);
            --color-card: rgba(30, 41, 59, 0.7);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            padding: 16px;
            background-image: radial-gradient(circle at 50% 0%, #1E293B 0%, #0F172A 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ========== HERO BANNER ========== */
        .hero-banner {
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            text-align: center;
            transition: all 0.3s ease;
        }

        .hero-banner.flyable {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.25) 0%, rgba(5, 150, 105, 0.15) 100%);
            border: 2px solid rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.15);
        }

        .hero-banner.not-flyable {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.25) 0%, rgba(185, 28, 28, 0.15) 100%);
            border: 2px solid rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
        }

        .hero-banner.no-data {
            background: linear-gradient(135deg, rgba(100, 116, 139, 0.25) 0%, rgba(71, 85, 105, 0.15) 100%);
            border: 2px solid rgba(100, 116, 139, 0.3);
        }

        .hero-status {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero-banner.flyable .hero-status {
            color: #34D399;
        }

        .hero-banner.not-flyable .hero-status {
            color: #F87171;
        }

        .hero-banner.no-data .hero-status {
            color: #94A3B8;
            font-size: 28px;
        }

        .hero-meta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .hero-rating {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
        }

        .hero-rating small {
            font-size: 20px;
            font-weight: 500;
            color: var(--color-text-light);
        }

        .hero-conditions {
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-summary {
            margin-top: 12px;
            font-size: 15px;
            color: var(--color-text-light);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-confidence {
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            color: var(--color-text-light);
        }

        .hero-confidence-bar {
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .hero-confidence-fill {
            height: 100%;
            background: var(--color-primary);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* ========== NAV BAR ========== */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .nav-bar .location-info {
            font-size: 13px;
            color: var(--color-text-light);
            font-weight: 500;
        }

        .nav-bar select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            font-size: 14px;
            cursor: pointer;
            background: #1E293B;
            color: var(--color-text);
            outline: none;
        }

        .trigger-update-button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .trigger-update-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .trigger-update-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .update-message {
            width: 100%;
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .update-message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #10B981;
            display: block;
        }

        .update-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #EF4444;
            display: block;
        }

        /* ========== HOURLY GRID ========== */
        .hourly-grid-container {
            background: var(--color-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            overflow-x: auto;
        }

        .hourly-grid-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--color-text-light);
        }

        .hourly-grid {
            display: grid;
            gap: 0;
            min-width: 600px;
        }

        .hourly-grid .grid-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-light);
            padding: 6px 8px;
            display: flex;
            align-items: center;
            white-space: nowrap;
            border-right: 1px solid var(--color-border);
            background: rgba(255, 255, 255, 0.02);
        }

        .hourly-grid .grid-cell {
            padding: 5px 4px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }

        .hourly-grid .grid-cell.hour-header {
            font-size: 14px;
            font-weight: 800;
            padding: 8px 4px;
            color: var(--color-text);
            border-bottom: 2px solid var(--color-border);
        }

        .hourly-grid .grid-cell .ampel {
            width: 28px;
            height: 10px;
            border-radius: 5px;
            margin: 0 auto;
        }

        .ampel-green {
            background: linear-gradient(90deg, #10B981, #34D399);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        .ampel-yellow {
            background: linear-gradient(90deg, #F59E0B, #FBBF24);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
        }

        .ampel-red {
            background: linear-gradient(90deg, #EF4444, #F87171);
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
        }

        .wind-arrow {
            display: inline-block;
            font-size: 14px;
            line-height: 1;
            transition: transform 0.3s;
        }

        .wind-ok {
            color: #34D399;
        }

        .wind-warn {
            color: #FBBF24;
        }

        .wind-bad {
            color: #F87171;
        }

        .cape-bar {
            width: 20px;
            margin: 0 auto;
            border-radius: 2px;
            min-height: 2px;
        }

        .cloud-bar {
            width: 24px;
            height: 6px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .cloud-bar-fill {
            height: 100%;
            background: #94A3B8;
            border-radius: 3px;
        }

        .bg-green {
            background-color: rgba(16, 185, 129, 0.06);
        }

        .bg-yellow {
            background-color: rgba(245, 158, 11, 0.06);
        }

        .bg-red {
            background-color: rgba(239, 68, 68, 0.06);
        }



        /* ========== EVALUATION DETAILS ========== */
        .evaluation-section {
            background: var(--color-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
        }

        .eval-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-text-light);
            margin-bottom: 12px;
        }

        .evaluation-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        .detail-section {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-title {
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 6px;
            color: var(--color-primary);
        }

        .detail-content {
            font-size: 12px;
            color: var(--color-text-light);
            line-height: 1.5;
        }

        .recommendation-section {
            margin-top: 12px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 10px;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .recommendation-section .detail-content {
            color: var(--color-text);
            font-weight: 500;
        }

        /* ========== FÖHN INDICATOR ========== */
        .foehn-box {
            background: var(--color-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .foehn-box.none {
            border-left: 4px solid #64748B;
            background: rgba(100, 116, 139, 0.08);
        }

        .foehn-box.caution {
            border-left: 4px solid var(--color-warning);
            background: rgba(245, 158, 11, 0.12);
        }

        .foehn-box.danger {
            border-left: 4px solid var(--color-danger);
            background: rgba(239, 68, 68, 0.12);
        }

        .foehn-icon {
            font-size: 28px;
            line-height: 1;
        }

        .foehn-box.none .foehn-icon {
            color: #64748B;
        }

        .foehn-box.caution .foehn-icon {
            color: var(--color-warning);
        }

        .foehn-box.danger .foehn-icon {
            color: var(--color-danger);
        }

        .foehn-content {
            flex: 1;
            min-width: 200px;
        }

        .foehn-label {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .foehn-message {
            font-size: 12px;
            color: var(--color-text-light);
            line-height: 1.5;
        }

        .foehn-details {
            font-size: 11px;
            color: var(--color-text-light);
            margin-top: 8px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .foehn-details span {
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 8px;
            border-radius: 6px;
        }

        /* ========== TOOLTIP ========== */
        .tooltip {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            min-width: 170px;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
            gap: 10px;
        }

        .tooltip-label {
            color: var(--color-text-light);
            font-weight: 500;
        }

        .tooltip-value {
            font-weight: 700;
        }

        .axis text {
            fill: var(--color-text-light);
            font-size: 11px;
            font-weight: 500;
        }

        .axis path,
        .axis line {
            stroke: var(--color-border);
        }

        .grid line {
            stroke: var(--color-border);
            stroke-opacity: 0.5;
        }

        .lane-label {
            font-size: 11px;
            font-weight: 700;
            fill: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading Progress Bar */
        .loading-progress {
            width: 100%;
            margin-top: 16px;
        }

        .loading-progress .progress-track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .loading-progress .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10B981, #34D399, #6EE7B7);
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
            position: relative;
        }

        .loading-progress .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .loading-progress .progress-steps {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.3px;
        }

        .loading-progress .progress-steps .active {
            color: #34D399;
            font-weight: 700;
        }

        .loading-progress .progress-steps .done {
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .hero-status {
                font-size: 28px;
            }

            .hero-rating {
                font-size: 36px;
            }

            .hero-banner {
                padding: 20px;
            }

            .evaluation-details {
                grid-template-columns: 1fr;
            }

            .nav-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- HERO BANNER -->
        <div class="hero-banner no-data" id="hero-banner">
            <div class="hero-status" id="hero-status">Keine Daten vorhanden</div>
            <div class="hero-meta" id="hero-meta" style="display:none;">
                <div class="hero-rating" id="hero-rating"></div>
                <span class="hero-conditions" id="hero-conditions"></span>
            </div>
            <div class="hero-summary" id="hero-summary">Klicke oben auf "Daten aktualisieren" um Wetterdaten abzurufen
            </div>
            <div class="hero-confidence" id="hero-confidence" style="display:none;">
                <span>KI-Konfidenz</span>
                <div class="hero-confidence-bar">
                    <div class="hero-confidence-fill" id="hero-confidence-fill"></div>
                </div>
                <span id="hero-confidence-val"></span>
            </div>
        </div>

        <!-- THERMAL OVERVIEW BADGE -->
        <div id="thermal-overview"
            style="display:none; background: var(--color-card); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 14px 20px; margin-bottom: 24px; box-shadow: var(--shadow-lg);">
            <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
                <div style="font-size:28px;" id="thermal-icon">☀️</div>
                <div style="flex:1; min-width:200px;">
                    <div style="font-size:14px; font-weight:700; margin-bottom:4px;" id="thermal-label">Thermik</div>
                    <div style="font-size:12px; color:var(--color-text-light); line-height:1.5;" id="thermal-detail">
                    </div>
                </div>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <div style="text-align:center;">
                        <div style="font-size:24px; font-weight:900;" id="thermal-climb">-</div>
                        <div style="font-size:11px; color:var(--color-text-light);">m/s Peak</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:24px; font-weight:900;" id="thermal-rating-val">-</div>
                        <div style="font-size:11px; color:var(--color-text-light);">Rating</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- NAV BAR -->
        <div class="nav-bar">
            <span class="location-info" id="location-info"></span>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <select id="day-select" style="display:none;"></select>
                <a href="/meteo"
                    style="padding:10px 20px;background:rgba(16,185,129,0.2);color:#34D399;border:1px solid rgba(16,185,129,0.3);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.3s ease;"
                    onmouseover="this.style.background='rgba(16,185,129,0.35)';this.style.transform='translateY(-2px)'"
                    onmouseout="this.style.background='rgba(16,185,129,0.2)';this.style.transform='none'">📊
                    Meteogramm</a>
                <a href="/config"
                    style="padding:10px 20px;background:rgba(99,102,241,0.2);color:#818CF8;border:1px solid rgba(99,102,241,0.3);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.3s ease;"
                    onmouseover="this.style.background='rgba(99,102,241,0.35)';this.style.transform='translateY(-2px)'"
                    onmouseout="this.style.background='rgba(99,102,241,0.2)';this.style.transform='none'">⚙
                    Konfiguration</a>
                <a href="http://127.0.0.1:8000" target="_blank"
                    style="padding:10px 20px;background:rgba(245,158,11,0.2);color:#FBBF24;border:1px solid rgba(245,158,11,0.3);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.3s ease;"
                    onmouseover="this.style.background='rgba(245,158,11,0.35)';this.style.transform='translateY(-2px)'"
                    onmouseout="this.style.background='rgba(245,158,11,0.2)';this.style.transform='none'">📚
                    Dokumentation</a>
                <button class="trigger-update-button" id="trigger-update-btn">Daten aktualisieren</button>
            </div>
            <div class="update-message" id="update-message"></div>
        </div>

        <!-- FÖHN INDICATOR -->
        <div class="foehn-box none" id="foehn-box" style="display:none;">
            <div class="foehn-icon" id="foehn-icon">💨</div>
            <div class="foehn-content">
                <div class="foehn-label" id="foehn-label">Föhn</div>
                <div class="foehn-message" id="foehn-message"></div>
                <div class="foehn-details" id="foehn-details"></div>
            </div>
        </div>

        <!-- EVALUATION DETAILS -->
        <div class="evaluation-section" id="evaluation-section" style="display:none;">
            <div class="eval-title">KI-Detailanalyse</div>
            <div class="evaluation-details">
                <div class="detail-section">
                    <div class="detail-title">Wind & Böen</div>
                    <div class="detail-content" id="wind-detail"></div>
                </div>
                <div class="detail-section">
                    <div class="detail-title">Thermik</div>
                    <div class="detail-content" id="thermik-detail"></div>
                </div>
                <div class="detail-section">
                    <div class="detail-title">Risiken</div>
                    <div class="detail-content" id="risks-detail"></div>
                </div>
            </div>
            <div class="recommendation-section">
                <div class="detail-title">Empfehlung</div>
                <div class="detail-content" id="recommendation"></div>
            </div>
        </div>

        <!-- HOURLY GRID -->
        <div class="hourly-grid-container">
            <div class="hourly-grid-title">Stunden-Übersicht</div>
            <div class="hourly-grid" id="hourly-grid"></div>
        </div>




    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        let weatherData = null;
        let evaluationData = null;
        let currentDate = null;
        let availableDates = [];
        let allowedWindRange = null;
        const tooltip = d3.select('#tooltip');

        function formatTime(date) { return d3.timeFormat('%H:%M')(date); }

        function getWindDirectionName(degrees) {
            const dirs = ['N', 'NNO', 'NO', 'ONO', 'O', 'OSO', 'SO', 'SSO', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            return dirs[Math.round(degrees / 22.5) % 16];
        }

        function directionToDegrees(dir) {
            const map = { N: 0, NNO: 22.5, NO: 45, ONO: 67.5, O: 90, OSO: 112.5, SO: 135, SSO: 157.5, S: 180, SSW: 202.5, SW: 225, WSW: 247.5, W: 270, WNW: 292.5, NW: 315, NNW: 337.5 };
            return map[dir.toUpperCase()] ?? null;
        }

        function parseAllowedWindDirection(allowedDir) {
            if (!allowedDir) return null;
            const parts = allowedDir.split('-');
            if (parts.length !== 2) return null;
            const s = directionToDegrees(parts[0].trim());
            const e = directionToDegrees(parts[1].trim());
            if (s === null || e === null) return null;
            return s > e ? { start: s, end: e + 360, wraps: true } : { start: s, end: e, wraps: false };
        }

        function isWindDirectionAllowed(wd, range) {
            if (!range) return true;
            if (range.wraps) return wd >= range.start || wd <= (range.end % 360);
            return wd >= range.start && wd <= range.end;
        }

        // Hourly flyability rating
        function getHourFlyability(wind) {
            const dirOk = isWindDirectionAllowed(wind.direction, allowedWindRange);
            const speed = wind.speed;
            const gusts = wind.gusts;
            // Find matching precip
            const precip = wind._precip || 0;

            if (speed > 25 || gusts > 40 || precip > 1) return 'red';
            if (speed > 20 || gusts > 30 || precip > 0.2 || !dirOk) return 'yellow';
            return 'green';
        }

        const conditionColors = {
            EXCELLENT: '#10B981', GOOD: '#34D399', MODERATE: '#F59E0B', POOR: '#F87171', DANGEROUS: '#EF4444'
        };

        // ========== DATA LOADING ==========
        async function loadData() {
            try {
                const [weatherResp, evalResp, foehnResp] = await Promise.all([
                    fetch('/api/weather'), fetch('/api/evaluation'), fetch('/api/foehn')
                ]);
                const weatherResult = await weatherResp.json();
                const evalResult = await evalResp.json();
                const foehnResult = await foehnResp.json();

                if (foehnResult.success && foehnResult.foehn) {
                    displayFoehn(foehnResult.foehn);
                } else {
                    document.getElementById('foehn-box').style.display = 'none';
                }

                if (weatherResult.success) {
                    // Check if data is empty (no weather data fetched yet)
                    if (!weatherResult.dates || weatherResult.dates.length === 0) {
                        document.getElementById('hero-status').textContent = 'Keine Daten vorhanden';
                        document.getElementById('hero-summary').textContent = 'Klicke oben auf "Daten aktualisieren" um Wetterdaten abzurufen';
                        document.getElementById('location-info').textContent = '';
                        return;
                    }
                    weatherData = weatherResult;
                    availableDates = weatherResult.dates || [];
                    allowedWindRange = parseAllowedWindDirection(weatherResult.location?.windrichtung);
                    updateLocationInfo(weatherResult);
                    setupDaySelector();
                    if (availableDates.length > 0) {
                        currentDate = availableDates[0];
                    }
                }

                if (evalResult.success) {
                    evaluationData = evalResult.evaluations || {};
                }

                if (currentDate) {
                    updateAll(currentDate);
                }
            } catch (error) {
                document.getElementById('hero-status').textContent = 'Fehler beim Laden';
            }
        }

        function updateAll(date) {
            buildHourlyGrid(date);
            displayThermalOverview(date);
            if (evaluationData?.[date]) {
                displayHeroBanner(evaluationData[date]);
                displayEvaluation(evaluationData[date]);
            } else {
                resetHeroBanner();
                document.getElementById('evaluation-section').style.display = 'none';
            }
        }

        function setupDaySelector() {
            const select = document.getElementById('day-select');
            if (availableDates.length === 0) return;
            select.style.display = 'block';
            select.innerHTML = '';
            availableDates.forEach((date, i) => {
                const opt = document.createElement('option');
                const d = new Date(date + 'T00:00:00');
                opt.value = date;
                opt.textContent = d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: 'short' });
                if (i === 0) opt.selected = true;
                select.appendChild(opt);
            });
            select.addEventListener('change', function () {
                currentDate = this.value;
                updateAll(currentDate);
            });
        }

        function updateLocationInfo(data) {
            const h = data.flight_hours;
            document.getElementById('location-info').textContent =
                `${data.location.name} \u2022 Startrichtung: ${data.location.windrichtung} \u2022 ${h.start}\u2013${h.end} Uhr`;
        }

        function displayFoehn(foehn) {
            const box = document.getElementById('foehn-box');
            const icon = document.getElementById('foehn-icon');
            const label = document.getElementById('foehn-label');
            const message = document.getElementById('foehn-message');
            const details = document.getElementById('foehn-details');

            box.className = 'foehn-box ' + (foehn.level || 'none');
            box.style.display = 'flex';

            const icons = { none: '\uD83C\uDF2A', caution: '\u26A0\uFE0F', danger: '\u26A0\uFE0F' };
            icon.textContent = icons[foehn.level] || icons.none;

            label.textContent = 'F\u00F6hn: ' + (foehn.label || 'Kein F\u00F6hn');
            message.textContent = foehn.message || '';

            const parts = [];
            if (foehn.delta_p_hpa != null) parts.push('\u0394P: ' + foehn.delta_p_hpa + ' hPa');
            if (foehn.crest_wind_kmh != null) parts.push('700hPa: ' + foehn.crest_wind_kmh + ' km/h');
            if (foehn.humidity_nord != null) parts.push('LF: ' + foehn.humidity_nord + '%');
            details.innerHTML = parts.map(p => '<span>' + p + '</span>').join('');
        }

        // ========== HERO BANNER ==========
        function displayHeroBanner(ev) {
            if (!ev) {
                resetHeroBanner();
                return;
            }
            const banner = document.getElementById('hero-banner');
            const status = document.getElementById('hero-status');
            const meta = document.getElementById('hero-meta');
            const rating = document.getElementById('hero-rating');
            const cond = document.getElementById('hero-conditions');
            const summary = document.getElementById('hero-summary');
            const conf = document.getElementById('hero-confidence');

            banner.className = 'hero-banner ' + (ev.flyable ? 'flyable' : 'not-flyable');
            status.textContent = ev.flyable ? 'FLIEGBAR' : 'NICHT FLIEGBAR';
            meta.style.display = 'flex';
            rating.innerHTML = (ev.rating || 0) + '<small>/10</small>';
            const c = conditionColors[ev.conditions] || '#94A3B8';
            cond.textContent = ev.conditions || '-';
            cond.style.background = `rgba(${hexToRgb(c)}, 0.2)`;
            cond.style.color = c;
            cond.style.border = `1px solid rgba(${hexToRgb(c)}, 0.4)`;
            summary.textContent = ev.summary || '';
            conf.style.display = 'flex';
            const confidenceVal = ev.confidence || 0;
            document.getElementById('hero-confidence-fill').style.width = (confidenceVal * 10) + '%';
            document.getElementById('hero-confidence-val').textContent = confidenceVal + '/10';
        }

        function resetHeroBanner() {
            document.getElementById('hero-banner').className = 'hero-banner no-data';
            document.getElementById('hero-status').textContent = 'Keine Bewertung verfügbar';
            document.getElementById('hero-meta').style.display = 'none';
            document.getElementById('hero-summary').textContent = '';
            document.getElementById('hero-confidence').style.display = 'none';
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r},${g},${b}`;
        }

        // ========== EVALUATION DETAILS ==========
        function displayEvaluation(ev) {
            const section = document.getElementById('evaluation-section');
            section.style.display = 'block';
            document.getElementById('wind-detail').textContent = ev.details?.wind || '-';
            document.getElementById('thermik-detail').textContent = ev.details?.thermik || '-';
            document.getElementById('risks-detail').textContent = ev.details?.risks || '-';
            document.getElementById('recommendation').textContent = ev.recommendation || '-';
        }

        // ========== THERMAL OVERVIEW ==========
        function displayThermalOverview(date) {
            const box = document.getElementById('thermal-overview');
            if (!box || !weatherData?.thermal_overview?.[date]) {
                if (box) box.style.display = 'none';
                return;
            }
            const t = weatherData.thermal_overview[date];
            const climb = t.peak_climb || 0;
            const rating = t.peak_rating || 0;
            const bestHour = t.best_hour ? new Date(t.best_hour).getHours() + ':00' : '-';

            // Anzeige
            document.getElementById('thermal-climb').textContent = climb.toFixed(1);
            document.getElementById('thermal-rating-val').textContent = rating + '/10';

            // Farbe
            const icon = document.getElementById('thermal-icon');
            const label = document.getElementById('thermal-label');
            const detail = document.getElementById('thermal-detail');

            if (climb >= 2.0) {
                icon.textContent = '🔥';
                label.textContent = 'Starke Thermik';
                label.style.color = '#34D399';
                document.getElementById('thermal-climb').style.color = '#34D399';
                box.style.borderLeft = '4px solid #10B981';
            } else if (climb >= 1.0) {
                icon.textContent = '☀️';
                label.textContent = 'Moderate Thermik';
                label.style.color = '#FBBF24';
                document.getElementById('thermal-climb').style.color = '#FBBF24';
                box.style.borderLeft = '4px solid #F59E0B';
            } else if (climb > 0) {
                icon.textContent = '⛅';
                label.textContent = 'Schwache Thermik';
                label.style.color = '#94A3B8';
                document.getElementById('thermal-climb').style.color = '#94A3B8';
                box.style.borderLeft = '4px solid #64748B';
            } else {
                icon.textContent = '☁️';
                label.textContent = 'Keine Thermik';
                label.style.color = '#64748B';
                document.getElementById('thermal-climb').style.color = '#64748B';
                box.style.borderLeft = '4px solid #334155';
            }
            detail.textContent = `Ø ${(t.avg_climb || 0).toFixed(1)} m/s · Beste Stunde: ${bestHour}`;
            box.style.display = 'block';
        }

        // ========== HOURLY GRID ==========
        function buildHourlyGrid(date) {
            const container = document.getElementById('hourly-grid');
            container.innerHTML = '';
            if (!weatherData?.days?.[date]) return;

            const dayData = weatherData.days[date];
            const winds = dayData.wind || [];
            const therms = dayData.thermik || [];
            const clouds = dayData.cloudbase || [];
            const precips = dayData.precipitation || [];

            // Map by hour
            const hours = [];
            winds.forEach((w, i) => {
                const dt = new Date(w.time);
                const h = dt.getHours();
                if (h < 9 || h > 18) return;
                const t = therms[i] || {};
                const cl = clouds[i] || {};
                const p = precips[i] || {};
                hours.push({
                    hour: h, speed: w.speed, gusts: w.gusts, direction: w.direction,
                    cape: t.cape || 0, climb_rate: t.climb_rate || 0, rating: t.rating || 0,
                    cover: cl.cover ?? null, height: cl.height ?? null,
                    precip: p.amount || 0, _precip: p.amount || 0
                });
            });

            if (hours.length === 0) {
                container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--color-text-light);">Keine Daten für diesen Tag</div>';
                return;
            }

            const cols = hours.length + 1; // +1 for label column
            container.style.gridTemplateColumns = `70px repeat(${hours.length}, 1fr)`;

            const rows = [
                { label: 'Uhrzeit', key: 'hour' },
                { label: 'Status', key: 'ampel' },
                { label: 'Wind km/h', key: 'wind' },
                { label: 'Böen km/h', key: 'gusts' },
                { label: 'Richtung', key: 'dir' },
                { label: 'Thermik m/s', key: 'climb' },
                { label: 'Wolken', key: 'cloud' },
                { label: 'Regen', key: 'rain' }
            ];

            // Hole LLM-Bewertungen für diesen Tag
            const evaluation = evaluationData?.evaluations?.[date];
            const hourlyEvaluations = evaluation?.hourly_evaluations || [];

            // Mapping-Funktion: LLM conditions → CSS-Klasse
            function mapLLMConditionsToColor(conditions, rating) {
                const cond = (conditions || '').toUpperCase();
                if (cond === 'EXCELLENT' || cond === 'GOOD') {
                    return 'green';
                } else if (cond === 'MODERATE') {
                    return 'yellow';
                } else if (cond === 'POOR') {
                    // Bei POOR: rating < 5 → rot, sonst gelb
                    return (rating && rating < 5) ? 'red' : 'yellow';
                } else if (cond === 'DANGEROUS') {
                    return 'red';
                }
                return null; // Fallback zu alter Funktion
            }

            // Erstelle Map von Stunde → LLM-Bewertung
            const hourlyEvalMap = {};
            hourlyEvaluations.forEach(eval => {
                const hour = eval.hour;
                hourlyEvalMap[hour] = eval;
            });

            // Compute flyability per hour - verwende LLM-Bewertungen wenn verfügbar
            const flyColors = hours.map(h => {
                const llmEval = hourlyEvalMap[h.hour];
                if (llmEval) {
                    const color = mapLLMConditionsToColor(llmEval.conditions, llmEval.rating);
                    if (color) {
                        return color;
                    }
                }
                // Fallback auf alte Funktion wenn keine LLM-Bewertung verfügbar
                return getHourFlyability({ speed: h.speed, gusts: h.gusts, direction: h.direction, _precip: h.precip });
            });

            rows.forEach(row => {
                // Label cell
                const label = document.createElement('div');
                label.className = 'grid-label';
                label.textContent = row.label;
                container.appendChild(label);

                hours.forEach((h, i) => {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell bg-' + flyColors[i];

                    if (row.key === 'hour') {
                        cell.classList.add('hour-header');
                        cell.textContent = h.hour + ':00';
                    } else if (row.key === 'ampel') {
                        const ampel = document.createElement('div');
                        ampel.className = 'ampel ampel-' + flyColors[i];
                        cell.appendChild(ampel);
                    } else if (row.key === 'wind') {
                        cell.textContent = h.speed.toFixed(0);
                        if (h.speed > 25) cell.style.color = '#F87171';
                        else if (h.speed > 20) cell.style.color = '#FBBF24';
                        else cell.style.color = '#34D399';
                    } else if (row.key === 'gusts') {
                        cell.textContent = h.gusts.toFixed(0);
                        if (h.gusts > 40) cell.style.color = '#F87171';
                        else if (h.gusts > 30) cell.style.color = '#FBBF24';
                        else cell.style.color = '#34D399';
                    } else if (row.key === 'dir') {
                        const ok = isWindDirectionAllowed(h.direction, allowedWindRange);
                        const arrow = document.createElement('span');
                        arrow.className = 'wind-arrow ' + (ok ? 'wind-ok' : 'wind-bad');
                        arrow.style.transform = `rotate(${(h.direction + 180) % 360}deg)`;
                        arrow.textContent = '\u2191';
                        cell.appendChild(arrow);
                        const lbl = document.createElement('div');
                        lbl.style.fontSize = '10px';
                        lbl.style.color = ok ? '#34D399' : '#F87171';
                        lbl.textContent = getWindDirectionName(h.direction);
                        cell.appendChild(lbl);
                    } else if (row.key === 'climb') {
                        const cr = h.climb_rate || 0;
                        const bar = document.createElement('div');
                        bar.className = 'cape-bar';
                        const maxH = 24;
                        const barH = Math.min(maxH, Math.max(2, (cr / 3.0) * maxH));
                        bar.style.height = barH + 'px';
                        if (cr >= 2.5) bar.style.background = '#EF4444';
                        else if (cr >= 1.5) bar.style.background = '#F97316';
                        else if (cr >= 0.8) bar.style.background = '#EAB308';
                        else if (cr > 0) bar.style.background = '#FDE047';
                        else bar.style.background = 'rgba(255,255,255,0.08)';
                        cell.appendChild(bar);
                        if (cr > 0) {
                            const v = document.createElement('div');
                            v.style.fontSize = '10px';
                            v.style.fontWeight = '700';
                            v.style.color = cr >= 1.5 ? '#F97316' : cr >= 0.8 ? '#EAB308' : 'var(--color-text-light)';
                            v.textContent = cr.toFixed(1);
                            cell.appendChild(v);
                        }
                    } else if (row.key === 'cloud') {
                        if (h.cover !== null) {
                            const bar = document.createElement('div');
                            bar.className = 'cloud-bar';
                            const fill = document.createElement('div');
                            fill.className = 'cloud-bar-fill';
                            fill.style.width = h.cover + '%';
                            bar.appendChild(fill);
                            cell.appendChild(bar);
                            const v = document.createElement('div');
                            v.style.fontSize = '9px';
                            v.style.color = 'var(--color-text-light)';
                            v.textContent = h.cover.toFixed(0) + '%';
                            cell.appendChild(v);
                        } else {
                            cell.textContent = '-';
                            cell.style.color = 'var(--color-text-light)';
                        }
                    } else if (row.key === 'rain') {
                        if (h.precip > 0) {
                            cell.textContent = h.precip.toFixed(1);
                            cell.style.color = '#38BDF8';
                        } else {
                            cell.textContent = '-';
                            cell.style.color = 'rgba(255,255,255,0.15)';
                        }
                    }

                    container.appendChild(cell);
                });
            });
        }

        // ========== TRIGGER UPDATE ==========
        document.getElementById('trigger-update-btn').addEventListener('click', async function () {
            const btn = this;
            const msg = document.getElementById('update-message');
            const hero = document.getElementById('hero-banner');
            const heroStatus = document.getElementById('hero-status');
            const heroSummary = document.getElementById('hero-summary');
            btn.disabled = true;
            const orig = btn.textContent;
            btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;"></span> Wird geladen...';
            msg.className = 'update-message';
            msg.textContent = '';

            // Progress bar in hero einbauen
            heroStatus.textContent = 'Daten werden geladen';
            heroSummary.innerHTML = '';
            document.getElementById('hero-meta').style.display = 'none';
            document.getElementById('hero-confidence').style.display = 'none';

            const progressHtml = `
                <div class="loading-progress" id="loading-progress">
                    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
                    <div class="progress-steps">
                        <span id="step-fetch" class="active">☁ Wetter abrufen</span>
                        <span id="step-llm">🤖 LLM-Analyse</span>
                        <span id="step-save">💾 Speichern</span>
                        <span id="step-done">✅ Fertig</span>
                    </div>
                </div>`;
            heroSummary.innerHTML = progressHtml;

            const steps = ['step-fetch', 'step-llm', 'step-save', 'step-done'];
            const pcts = [15, 50, 80, 100];
            const labels = ['Wetterdaten werden abgerufen...', 'LLM analysiert Flugbedingungen...', 'Ergebnisse werden gespeichert...', 'Fertig!'];

            function setStep(idx) {
                const fill = document.getElementById('progress-fill');
                if (fill) fill.style.width = pcts[idx] + '%';
                if (heroStatus) heroStatus.textContent = labels[idx];
                steps.forEach((s, i) => {
                    const el = document.getElementById(s);
                    if (el) el.className = i < idx ? 'done' : (i === idx ? 'active' : '');
                });
            }

            // Simuliere Fortschritt waehrend der Anfrage laeuft
            setStep(0);
            const stepTimers = [
                setTimeout(() => setStep(1), 3000),
                setTimeout(() => setStep(2), 8000)
            ];

            try {
                const resp = await fetch('/api/trigger-update', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
                if (!resp.ok) throw new Error('API Fehler: ' + resp.status);
                const data = await resp.json();
                stepTimers.forEach(clearTimeout);

                if (data.success) {
                    setStep(3);
                    msg.className = 'update-message success';
                    msg.textContent = 'Aktualisiert! Seite wird neu geladen...';
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    msg.className = 'update-message error';
                    msg.textContent = data.error || 'Fehler';
                    heroStatus.textContent = 'Fehler beim Laden';
                    heroSummary.textContent = data.error || 'Unbekannter Fehler';
                    btn.disabled = false; btn.textContent = orig;
                }
            } catch (e) {
                stepTimers.forEach(clearTimeout);
                msg.className = 'update-message error';
                msg.textContent = 'Netzwerkfehler: ' + e.message;
                heroStatus.textContent = 'Verbindungsfehler';
                heroSummary.textContent = e.message;
                btn.disabled = false; btn.textContent = orig;
            }
        });

        loadData();
    </script>
</body>
